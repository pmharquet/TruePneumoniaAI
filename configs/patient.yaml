data:
  data_dir: "chest_Xray_patient" # leak-free patient-level re-split
  image_size: 224
  num_workers: 8
  prefetch_factor: 4
  batch_size: 128
  # The generated val is already a proper patient-disjoint split, so don't carve
  # a second val out of train — use the val/ folder directly.
  val_split: 0.0
  clahe: true

model:
  backbone: "densenet121" # densenet121 | resnet50
  pretrained: true
  num_classes: 1 # binary: NORMAL vs PNEUMONIA
  dropout: 0.5

training:
  max_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  label_smoothing: 0.05
  freeze_backbone: true
  precision: "16-mixed"
  deterministic: false
  compile: false
  seed: 42

threshold:
  default: 0.5
  target_sensitivity: 0.95

mlflow:
  tracking_uri: "mlruns"
  experiment_name: "TruePneumoniaAI-patient"

paths:
  checkpoints: "checkpoints"
  onnx_export: "exports/model.onnx"
  gradcam_output: "outputs/gradcam"

dashboard:
  log_every_n_steps: 10
